<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0D9488" />
  <title>Sin conexión — Emporium</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal: #0D9488;
      --teal-dark: #0f766e;
      --teal-light: #ccfbf1;
      --slate: #64748b;
      --slate-light: #f1f5f9;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f0fdfa 0%, #e0f2fe 100%);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08), 0 4px 16px rgba(0,0,0,0.04);
    }

    .logo {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--teal), var(--teal-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 8px 24px rgba(13,148,136,0.35);
    }

    .logo-text {
      font-size: 36px;
      font-weight: 900;
      color: white;
      letter-spacing: -2px;
      line-height: 1;
    }

    .wifi-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 20px;
      color: var(--slate);
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 10px;
      line-height: 1.3;
    }

    .subtitle {
      font-size: 14px;
      color: var(--slate);
      line-height: 1.6;
      margin-bottom: 8px;
    }

    .info-box {
      background: var(--teal-light);
      border-radius: 12px;
      padding: 14px 16px;
      margin: 20px 0 28px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      text-align: left;
    }

    .info-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      margin-top: 1px;
      color: var(--teal-dark);
    }

    .info-text {
      font-size: 13px;
      color: var(--teal-dark);
      line-height: 1.5;
      font-weight: 500;
    }

    .btn-retry {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--teal);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 14px 28px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      width: 100%;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      min-height: 50px;
    }

    .btn-retry:hover { background: var(--teal-dark); }
    .btn-retry:active { transform: scale(0.97); }

    .btn-retry svg {
      width: 18px;
      height: 18px;
      transition: transform 0.4s;
    }

    .btn-retry.loading svg { animation: spin 0.8s linear infinite; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .cached-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #dcfce7;
      color: #15803d;
      border-radius: 99px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; }

    .footer {
      margin-top: 28px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span class="logo-text">E</span>
    </div>

    <div class="cached-badge">
      <span class="dot"></span>
      Datos locales disponibles
    </div>

    <h1>Sin conexión a internet</h1>
    <p class="subtitle">No pudimos conectarnos al servidor. Revisa tu red e intenta de nuevo.</p>

    <div class="info-box">
      <svg class="info-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <span class="info-text">Las páginas que visitaste recientemente siguen disponibles sin conexión. Los datos nuevos se sincronizarán cuando vuelvas a conectarte.</span>
    </div>

    <button class="btn-retry" onclick="retryConnection(this)">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
      </svg>
      Reintentar conexión
    </button>

    <p class="footer">Emporium · Sistema de Distribución</p>
  </div>

  <script>
    async function retryConnection(btn) {
      btn.classList.add('loading')
      btn.disabled = true
      try {
        const response = await fetch('/api/health?' + Date.now(), {
          cache: 'no-store',
          signal: AbortSignal.timeout(5000)
        })
        if (response.ok || response.status < 500) {
          window.location.href = '/dashboard'
          return
        }
      } catch {}
      // Fallback: try navigating to dashboard
      try {
        await fetch('/manifest.json', { cache: 'no-store', signal: AbortSignal.timeout(3000) })
        window.location.href = '/dashboard'
        return
      } catch {}
      btn.classList.remove('loading')
      btn.disabled = false
      btn.textContent = 'Aún sin conexión — Reintentar'
    }

    // Auto-retry when connectivity returns
    window.addEventListener('online', () => {
      window.location.href = '/dashboard'
    })
  </script>
</body>
</html>
